</style>
<text x="800" y="42" text-anchor="middle" class="T">NL2SQL 多 Agent 闭环方法流程图</text>
<text x="800" y="66" text-anchor="middle" class="ST">快速通道优先 &#183; 双阶段生成核心 &#183; 三层纠错兜底 &#183; 上下文精准适配</text>
<rect x="36" y="85" width="1528" height="115" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="105" class="SH">01 // 意图识别与规则守门 (t=0)</text>
<rect x="60" y="110" width="200" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="160" y="130" text-anchor="middle" class="NL">用户输入</text>
<text x="160" y="146" text-anchor="middle" class="NB">自然语言问题</text>
<rect x="310" y="110" width="240" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="430" y="130" text-anchor="middle" class="NL">规则通道</text>
<text x="430" y="146" text-anchor="middle" class="NB">关键词 + 正则</text>
<text x="430" y="161" text-anchor="middle" class="NB">毫秒级意图分类</text>
<rect x="600" y="110" width="240" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="720" y="130" text-anchor="middle" class="NL">LLM 通道</text>
<text x="720" y="146" text-anchor="middle" class="NB">微调领域大模型</text>
<text x="720" y="161" text-anchor="middle" class="NB">细粒度意图识别</text>
<rect x="890" y="110" width="260" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1020" y="130" text-anchor="middle" class="NL">规则守门单元</text>
<text x="1020" y="146" text-anchor="middle" class="NB">拦截注入/DDL/越权</text>
<text x="1020" y="161" text-anchor="middle" class="NB">冲突时规则优先</text>
<rect x="1200" y="110" width="280" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1340" y="130" text-anchor="middle" class="NL">合法意图输出</text>
<text x="1340" y="146" text-anchor="middle" class="NB">数据查询 / 闲聊 / 拒绝</text>
<line x1="260" y1="148" x2="310" y2="148" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="550" y1="140" x2="600" y2="140" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="550" y1="158" x2="600" y2="158" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="840" y1="148" x2="890" y2="148" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="1150" y1="148" x2="1200" y2="148" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="490" y="136" text-anchor="middle" class="AN">并行双轨</text>
<rect x="36" y="210" width="1528" height="120" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="230" class="SH">02 // 分级快速通道调度（任一命中即跳过生成）</text>
<rect x="60" y="240" width="320" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="220" y="260" text-anchor="middle" class="NL">L1: 已验证模板匹配</text>
<text x="220" y="276" text-anchor="middle" class="NB">语义相似度匹配 + 槽位填充</text>
<rect x="430" y="240" width="320" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="590" y="260" text-anchor="middle" class="NL">L2: 领域规则构建</text>
<text x="590" y="276" text-anchor="middle" class="NB">固定口径 / 规则引擎直出 SQL</text>
<rect x="800" y="240" width="320" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="960" y="260" text-anchor="middle" class="NL">L3: SQL 缓存命中</text>
<text x="960" y="276" text-anchor="middle" class="NB">语义向量 key / 相似度阈值</text>
<rect x="1200" y="240" width="280" height="75" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1340" y="260" text-anchor="middle" class="NL">三级均未命中</text>
<text x="1340" y="276" text-anchor="middle" class="NB">进入双阶段生成流程</text>
<line x1="380" y1="278" x2="430" y2="278" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="750" y1="278" x2="800" y2="278" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="1120" y1="278" x2="1200" y2="278" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<path d="M 220 315 L 220 340 L 1480 340 L 1480 780" fill="none" stroke="#06d6a0" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#ag)"/>
<path d="M 590 315 L 590 340" fill="none" stroke="#06d6a0" stroke-width="1.3" stroke-dasharray="5,3"/>
<path d="M 960 315 L 960 340" fill="none" stroke="#06d6a0" stroke-width="1.3" stroke-dasharray="5,3"/>
<rect x="1455.0" y="351" width="50" height="14" rx="2" fill="#0a1628" fill-opacity="0.92"/>
<text x="1480" y="362" text-anchor="middle" class="AN" fill="#06d6a0">命中直达评审</text>
<rect x="36" y="380" width="1528" height="100" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="400" class="SH">03 // 短会话上下文精准适配</text>
<rect x="60" y="405" width="360" height="62" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="240" y="425" text-anchor="middle" class="NL">上下文判定 LLM</text>
<text x="240" y="441" text-anchor="middle" class="NB">判断是否多轮追问 (follow-up)</text>
<rect x="480" y="405" width="440" height="62" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="700" y="425" text-anchor="middle" class="NL">构造 effective_question</text>
<text x="700" y="441" text-anchor="middle" class="NB">追问: 提取历史核心语义 + 当前问题融合</text>
<text x="700" y="456" text-anchor="middle" class="NB">非追问: 直接使用原始问题</text>
<rect x="1000" y="405" width="460" height="62" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1230" y="425" text-anchor="middle" class="NL">输出有效问题</text>
<text x="1230" y="441" text-anchor="middle" class="NB">避免全量上下文导致 Prompt 冗余</text>
<line x1="420" y1="436" x2="480" y2="436" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="920" y1="436" x2="1000" y2="436" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<rect x="36" y="490" width="1528" height="175" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="510" class="SH">04 // 双阶段生成与一致性校验（Coder Agent）</text>
<rect x="60" y="520" width="350" height="130" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="235" y="540" text-anchor="middle" class="NL">阶段一: NL → 结构化 DSL</text>
<text x="235" y="556" text-anchor="middle" class="NB">输入: effective_question + schema</text>
<text x="235" y="571" text-anchor="middle" class="NB">输出: 结构化 DSL（6 要素）</text>
<text x="235" y="586" text-anchor="middle" class="NB">表选择 / 字段映射 / 关联关系</text>
<text x="235" y="601" text-anchor="middle" class="NB">筛选条件 / 分组排序 / 业务约束</text>
<text x="235" y="616" text-anchor="middle" class="NB">同步 DSL 级前置校验</text>
<rect x="460" y="520" width="280" height="130" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="600" y="540" text-anchor="middle" class="NL">DSL 前置校验</text>
<text x="600" y="556" text-anchor="middle" class="NB">schema 合法性</text>
<text x="600" y="571" text-anchor="middle" class="NB">join 逻辑</text>
<text x="600" y="586" text-anchor="middle" class="NB">where 条件</text>
<text x="600" y="601" text-anchor="middle" class="NB">聚合函数校验</text>
<text x="600" y="616" text-anchor="middle" class="NB">不通过 → 重新生成</text>
<rect x="790" y="520" width="350" height="130" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="965" y="540" text-anchor="middle" class="NL">阶段二: DSL → 参数化 SQL</text>
<text x="965" y="556" text-anchor="middle" class="NB">输入: DSL + 方言信息</text>
<text x="965" y="571" text-anchor="middle" class="NB">(MySQL / PostgreSQL / Oracle)</text>
<text x="965" y="586" text-anchor="middle" class="NB">输出: 可执行参数化 SQL</text>
<rect x="1190" y="520" width="340" height="130" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1360" y="540" text-anchor="middle" class="NL">DSL-SQL 一致性校验</text>
<text x="1360" y="556" text-anchor="middle" class="NB">字符串级核心要素一致性</text>
<text x="1360" y="571" text-anchor="middle" class="NB">语义级查询逻辑一致性</text>
<text x="1360" y="586" text-anchor="middle" class="NB">不通过 → 返回重新转换</text>
<line x1="410" y1="585" x2="460" y2="585" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="740" y1="585" x2="790" y2="585" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="1140" y1="585" x2="1190" y2="585" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<path d="M 600 650 C 600 680, 230 680, 230 650" fill="none" stroke="#f77f00" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#aw)"/>
<rect x="384.5" y="669" width="71" height="14" rx="2" fill="#0a1628" fill-opacity="0.92"/>
<text x="420" y="680" text-anchor="middle" class="AN" fill="#f77f00">校验失败回流重生成</text>
<path d="M 1360 650 C 1360 680, 970 680, 970 650" fill="none" stroke="#f77f00" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#aw)"/>
<rect x="1134.5" y="669" width="71" height="14" rx="2" fill="#0a1628" fill-opacity="0.92"/>
<text x="1170" y="680" text-anchor="middle" class="AN" fill="#f77f00">校验失败回流重转换</text>
<rect x="36" y="700" width="1528" height="150" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="720" class="SH">05 // 多 Agent 评审与受限次自修正（上限 2 次）</text>
<rect x="60" y="730" width="340" height="105" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="230" y="750" text-anchor="middle" class="NL">Reviewer Agent</text>
<text x="230" y="766" text-anchor="middle" class="NB">EXPLAIN 执行计划预检</text>
<text x="230" y="781" text-anchor="middle" class="NB">安全护栏 Guardrail 校验</text>
<text x="230" y="796" text-anchor="middle" class="NB">DSL-SQL 二次对齐校验</text>
<text x="230" y="811" text-anchor="middle" class="NB">业务规则合规性检查</text>
<rect x="460" y="730" width="340" height="105" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="630" y="750" text-anchor="middle" class="NL">Self-Correction Agent</text>
<text x="630" y="766" text-anchor="middle" class="NB">根据评审意见修复 SQL</text>
<text x="630" y="781" text-anchor="middle" class="NB">修正后返回 Reviewer</text>
<text x="630" y="796" text-anchor="middle" class="NB">修正次数 ≤ 2 次</text>
<rect x="870" y="730" width="280" height="105" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1010" y="750" text-anchor="middle" class="NL">评审通过</text>
<text x="1010" y="766" text-anchor="middle" class="NB">全部校验通过</text>
<text x="1010" y="781" text-anchor="middle" class="NB">进入 SQL 执行环节</text>
<rect x="1220" y="730" width="300" height="105" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1370" y="750" text-anchor="middle" class="NL">评审拒绝</text>
<text x="1370" y="766" text-anchor="middle" class="NB">超过修正上限</text>
<text x="1370" y="781" text-anchor="middle" class="NB">直接拒绝输出，避免循环</text>
<line x1="400" y1="783" x2="460" y2="783" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="800" y1="783" x2="870" y2="783" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<line x1="1150" y1="783" x2="1220" y2="783" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#ac)"/>
<path d="M 630 835 C 630 862, 230 862, 230 835" fill="none" stroke="#f77f00" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#aw)"/>
<rect x="401.5" y="851" width="57" height="14" rx="2" fill="#0a1628" fill-opacity="0.92"/>
<text x="430" y="862" text-anchor="middle" class="AN" fill="#f77f00">修正后重新评审</text>
<rect x="36" y="870" width="1528" height="125" rx="4" fill="#0d1f3c" fill-opacity="0.45" stroke="#00b4d8" stroke-width="1.2"/>
<text x="52" y="890" class="SH">06 // SQL 执行与结果语义增强</text>
<rect x="60" y="900" width="340" height="80" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="230" y="920" text-anchor="middle" class="NL">数据库执行引擎</text>
<text x="230" y="936" text-anchor="middle" class="NB">执行参数化 SQL</text>
<text x="230" y="951" text-anchor="middle" class="NB">获取查询结果或错误信息</text>
<rect x="460" y="900" width="380" height="80" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="650" y="920" text-anchor="middle" class="NL">结果语义增强</text>
<text x="650" y="936" text-anchor="middle" class="NB">编码/ID → 业务语义名称</text>
<text x="650" y="951" text-anchor="middle" class="NB">统计指标添加结构化释义</text>
<rect x="900" y="900" width="350" height="80" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1075" y="920" text-anchor="middle" class="NL">执行后兜底纠错（第三层）</text>
<text x="1075" y="936" text-anchor="middle" class="NB">执行失败 → Self-Correction Agent</text>
<text x="1075" y="951" text-anchor="middle" class="NB">修复计入总上限（≤2 次）</text>
<rect x="1310" y="900" width="200" height="80" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1410" y="920" text-anchor="middle" class="NL">返回用户</text>
<text x="1410" y="936" text-anchor="middle" class="NB">最终查询结果</text>
