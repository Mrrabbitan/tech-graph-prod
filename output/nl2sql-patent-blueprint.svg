<rect x="1240" y="1000" width="320" height="58" rx="4" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
<text x="1400" y="1020" text-anchor="middle" class="NL">四 Agent 有向有环状态机</text>
<text x="1400" y="1038" text-anchor="middle" class="AN">Intent → Coder → Reviewer ⇄ Self-Correction</text>
<text x="1400" y="1052" text-anchor="middle" class="AN">全流程分工协作 &#183; 闭环管控</text>
<rect x="60" y="1070" width="860" height="28" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="0.8"/>
