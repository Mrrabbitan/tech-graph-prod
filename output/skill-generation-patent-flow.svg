    <polygon points="0 0, 8 3, 0 6" fill="#f77f00"/>
  </marker>
  <marker id="aw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#90e0ef"/>
  </marker>
  <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feFlood flood-color="#00b4d8" flood-opacity="0.15" result="color"/>
    <feComposite in="color" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
